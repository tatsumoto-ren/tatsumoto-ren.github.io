[site]
main_blog = "tatsumoto"
global_url = "https://ajatt.top/"
generate_landing = true
index_file="index.html"
templates_dir = "templates"
num_recent_posts = 10
favicon_path = "img/logo.webp"
css_include=['index.css']
js_include=[]

[blogs.tatsumoto]
md_dir = "blog"
output_dir = "blog"
templates_dir = "blog/templates"
global_title = "All Japanese All The Time | AJATT"
global_short_title = "AJATT"
global_description = "Tatsumoto's guide to learning Japanese. The fastest way to reach native-level fluency in a foreign language."
global_keywords = "Learn Japanese, Tatsumoto's Guide to Japanese, Path to Japanese fluency, AJATT, All Japanese All The Time"

global_author="Tatsumoto Ren"
global_author_url="https://github.com/tatsumoto-ren"
global_email=""

css_include=['blog/res/blog.css',]
js_include=['blog/res/blog.js', 'blog/res/search.js']

# Tag prefix for tag files
prefix_tags="tag_"

# Table of contents file for navigation
table_of_contents="table-of-contents.md"

# Index begin content file
index_begin_file="blog/templates/index_begin.html"

# Truncate posts on index page at ---- (horizontal rule in markdown)
truncate_index=true

# Template strings for localization
template_tags_posts="posts"
template_tags_posts_2_4="posts"
template_tags_posts_singular="post"

# Archive and tags index files
archive_index="all_posts.html"
tags_index="all_tags.html"
index_file="index.html"
number_of_index_articles=10
